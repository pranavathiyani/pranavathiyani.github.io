// ── Runtime state ─────────────────────────────────────────────
const ua={}, shuffled=[], optMap={};
let submitted=false;

// Shuffle array in-place (Fisher-Yates)
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

// Build shuffled question order + shuffled option order per question
function init(){
  const idx=Q.map((_,i)=>i);
  shuffle(idx);
  shuffled.length=0;
  idx.forEach(i=>{
    const q=Q[i];
    // Build shuffled option list for this question
    const opts=q.o.map((text,oi)=>({text,orig:oi}));
    shuffle(opts);
    // Store the mapping: shuffledPosition -> original index
    optMap[q.id]=opts;
    shuffled.push(q);
  });
}

function build(){
  init();
  const c=document.getElementById('qc');
  c.innerHTML='';
  shuffled.forEach((q,qi)=>{
    const opts=optMap[q.id];
    const card=document.createElement('div');
    card.className='qcard';card.id='c'+q.id;
    const ohtml=opts.map((o,si)=>`
      <button class="opt" id="o${q.id}_${si}" onclick="pick(${q.id},${si})" aria-label="Option ${String.fromCharCode(65+si)}">
        <span class="ok">${String.fromCharCode(65+si)}</span>
        <span>${o.text}</span>
      </button>`).join('');
    card.innerHTML=`<div class="qn">Question ${qi+1} of 50</div>
      <div class="qt">${q.q}</div>
      <div class="opts" id="opts${q.id}">${ohtml}</div>
      <div class="fb" id="fb${q.id}"></div>`;
    c.appendChild(card);
  });
}

function pick(qid,si){
  if(submitted)return;
  ua[qid]=si;
  document.getElementById('c'+qid).classList.add('answered');
  const opts=optMap[qid];
  opts.forEach((_,i)=>document.getElementById('o'+qid+'_'+i).classList.remove('sel'));
  document.getElementById('o'+qid+'_'+si).classList.add('sel');
  prog();
}

function prog(){
  const n=Object.keys(ua).length;
  document.getElementById('pb').style.width=(n/50*100)+'%';
  document.getElementById('pt').textContent=n+' / 50 answered';
}

// Answer verification — compares chosen option text against the stored correct key (ak)
// No raw correct index is ever visible in the DOM or in a simple source read
function isCorrect(q){
  const chosen=ua[q.id];
  if(chosen===undefined)return false;
  const chosenOrig=optMap[q.id][chosen].orig;
  return chosenOrig===q.ak;
}

function submitQ(){
  const n=Object.keys(ua).length;
  const w=document.getElementById('warn');
  if(n<50){w.style.display='block';w.textContent=`Please answer all 50 questions first. You have answered ${n}/50.`;return;}
  w.style.display='none';
  submitted=true;
  document.getElementById('subbtn').disabled=true;

  let tot=0;
  const uc={1:0,2:0,3:0},ut={1:0,2:0,3:0};

  shuffled.forEach(q=>{
    ut[q.u]++;
    const ok=isCorrect(q);
    if(ok)tot++;
    const card=document.getElementById('c'+q.id);
    card.classList.remove('answered');
    card.classList.add(ok?'correct':'incorrect');

    const opts=optMap[q.id];
    opts.forEach((_,si)=>{
      const btn=document.getElementById('o'+q.id+'_'+si);
      btn.disabled=true;
      btn.classList.remove('sel');
      const origIdx=opts[si].orig;
      if(origIdx===q.ak) btn.classList.add('right');
      else if(si===ua[q.id]&&!ok) btn.classList.add('wrong');
    });
    if(ok)uc[q.u]++;

    const fb=document.getElementById('fb'+q.id);
    fb.className='fb '+(ok?'c':'x');
    fb.innerHTML=(ok?'✓ Correct. ':'✗ Incorrect. ')+q.exp;
  });

  const pct=Math.round(tot/50*100);
  let g,gc;
  if(pct>=85){g='Grade A — Excellent!';gc='gA'}
  else if(pct>=70){g='Grade B — Good work!';gc='gB'}
  else if(pct>=55){g='Grade C — Needs revision';gc='gC'}
  else{g='Grade D — Review all units';gc='gD'}

  document.getElementById('rs').textContent=tot+' / 50';
  document.getElementById('rsub').textContent=pct+'% — '+(50-tot)+' incorrect';
  const rg=document.getElementById('rg');rg.textContent=g;rg.className='gb '+gc;

  const unames={1:'Unit I — Fundamentals',2:'Unit II — OOP & Regex',3:'Unit III — Biopython & Libraries'};
  document.getElementById('ubd').innerHTML=[1,2,3].map(u=>
    `<div class="ub"><div class="ul">${unames[u]}</div><div class="us">${uc[u]} / ${ut[u]}</div></div>`).join('');

  document.getElementById('rp').style.display='block';
  document.getElementById('rp').scrollIntoView({behavior:'smooth'});
}

function retake(){
  Object.keys(ua).forEach(k=>delete ua[k]);
  submitted=false;
  document.getElementById('subbtn').disabled=false;
  document.getElementById('rp').style.display='none';
  document.getElementById('warn').style.display='none';
  build();
  prog();
  window.scrollTo({top:0,behavior:'smooth'});
}

build();
prog();
</script>
