<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIN304 – Python Programming for Biologists Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4ef;
    color: #1a1a18;
    min-height: 100vh;
  }
  header {
    background: #fff;
    border-bottom: 0.5px solid #d3d1c7;
    padding: 1.5rem 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  header h1 { font-size: 18px; font-weight: 500; color: #1a1a18; }
  header p { font-size: 13px; color: #888780; margin-top: 2px; }
  #progress-bar-wrap {
    background: #e8e6e0;
    border-radius: 99px;
    height: 6px;
    width: 220px;
    overflow: hidden;
  }
  #progress-bar { height: 100%; background: #534AB7; border-radius: 99px; transition: width 0.3s; width: 0%; }
  #progress-text { font-size: 13px; color: #888780; margin-top: 4px; text-align: right; }

  main { max-width: 820px; margin: 2rem auto; padding: 0 1.5rem 4rem; }

  .unit-header {
    font-size: 13px; font-weight: 500; letter-spacing: 0.05em;
    text-transform: uppercase; color: #534AB7;
    margin: 2.5rem 0 1rem;
    padding-bottom: 6px;
    border-bottom: 0.5px solid #CECBF6;
  }

  .question-card {
    background: #fff;
    border: 0.5px solid #d3d1c7;
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .question-card.answered { border-color: #9FE1CB; }
  .question-card.correct { border-color: #1D9E75; background: #f2fcf8; }
  .question-card.incorrect { border-color: #E24B4A; background: #fdf3f3; }

  .q-number { font-size: 11px; color: #888780; margin-bottom: 6px; }
  .q-text { font-size: 15px; color: #1a1a18; line-height: 1.6; margin-bottom: 1rem; }
  .q-text code { background: #f1efe8; padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 13px; }

  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 14px;
    border: 0.5px solid #d3d1c7;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #1a1a18;
    transition: background 0.15s, border-color 0.15s;
    line-height: 1.5;
    background: #fff;
    text-align: left;
    width: 100%;
  }
  .option:hover:not(:disabled) { background: #f5f4ef; border-color: #888780; }
  .option .opt-key {
    font-weight: 500; font-size: 13px; color: #534AB7;
    min-width: 18px; margin-top: 1px;
  }

  .option.selected { border-color: #534AB7; background: #EEEDFE; }
  .option.correct-ans { border-color: #1D9E75; background: #E1F5EE; }
  .option.correct-ans .opt-key { color: #0F6E56; }
  .option.wrong-ans { border-color: #E24B4A; background: #FCEBEB; }
  .option.wrong-ans .opt-key { color: #A32D2D; }
  .option:disabled { cursor: default; }

  .feedback {
    margin-top: 10px; font-size: 13px; line-height: 1.6;
    display: none; padding: 10px 14px; border-radius: 8px;
  }
  .feedback.correct { display: block; background: #E1F5EE; color: #085041; }
  .feedback.incorrect { display: block; background: #FCEBEB; color: #A32D2D; }

  #submit-section {
    margin-top: 2.5rem;
    text-align: center;
  }
  #submit-btn {
    background: #534AB7;
    color: #fff;
    border: none;
    padding: 14px 40px;
    border-radius: 99px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  #submit-btn:hover { background: #3C3489; }
  #submit-btn:active { transform: scale(0.98); }
  #submit-btn:disabled { background: #b4b2a9; cursor: default; }

  #results-panel {
    display: none;
    margin-top: 2rem;
    background: #fff;
    border: 0.5px solid #d3d1c7;
    border-radius: 16px;
    padding: 2rem;
    text-align: center;
  }
  #results-panel h2 { font-size: 22px; font-weight: 500; margin-bottom: 0.5rem; }
  #results-panel .score-big { font-size: 48px; font-weight: 500; color: #534AB7; }
  #results-panel .score-sub { font-size: 15px; color: #888780; margin-bottom: 1.5rem; }
  .grade-badge {
    display: inline-block;
    padding: 6px 20px; border-radius: 99px;
    font-size: 14px; font-weight: 500; margin-bottom: 1.5rem;
  }
  .grade-A { background: #E1F5EE; color: #0F6E56; }
  .grade-B { background: #E6F1FB; color: #185FA5; }
  .grade-C { background: #FAEEDA; color: #854F0B; }
  .grade-D { background: #FCEBEB; color: #A32D2D; }

  .unit-breakdown { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 1.5rem; }
  .unit-box { background: #f5f4ef; border-radius: 10px; padding: 12px 20px; min-width: 160px; }
  .unit-box .u-label { font-size: 12px; color: #888780; }
  .unit-box .u-score { font-size: 20px; font-weight: 500; color: #1a1a18; }

  #retake-btn {
    margin-top: 1.5rem;
    background: #fff;
    color: #534AB7;
    border: 1px solid #534AB7;
    padding: 10px 30px;
    border-radius: 99px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #retake-btn:hover { background: #EEEDFE; }

  .warning-banner {
    background: #FAEEDA; color: #633806;
    border: 0.5px solid #FAC775;
    border-radius: 8px;
    padding: 10px 16px; font-size: 13px;
    margin-top: 1rem; display: none;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>BIN304 — Python Programming for Biologists</h1>
    <p>50 Questions &nbsp;·&nbsp; All 3 Units</p>
  </div>
  <div>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="progress-text">0 / 50 answered</div>
  </div>
</header>

<main>
  <div id="quiz-container"></div>

  <div id="submit-section">
    <div class="warning-banner" id="warning-banner">Please answer all 50 questions before submitting.</div>
    <br>
    <button id="submit-btn" onclick="submitQuiz()">Submit Quiz &amp; See Results</button>
  </div>

  <div id="results-panel">
    <h2>Quiz Complete!</h2>
    <div class="score-big" id="res-score"></div>
    <div class="score-sub" id="res-sub"></div>
    <div id="res-grade" class="grade-badge"></div>
    <div class="unit-breakdown" id="unit-breakdown"></div>

    <button id="retake-btn" onclick="retakeQuiz()">Retake Quiz</button>
  </div>
</main>

<script>
const questions = [
  // ── UNIT I: Introductory Concepts (Q1–Q18) ──────────────────────
  {
    unit: 1, id: 1,
    q: "Which of the following is NOT a feature of Python?",
    opts: ["Interpreted language", "Statically typed", "High-level language", "Open source"],
    ans: 1,
    exp: "Python is dynamically typed, not statically typed. Variables do not require explicit type declarations."
  },
  {
    unit: 1, id: 2,
    q: "What is the output of <code>type(3.14)</code>?",
    opts: ["&lt;class 'int'&gt;", "&lt;class 'float'&gt;", "&lt;class 'double'&gt;", "&lt;class 'str'&gt;"],
    ans: 1,
    exp: "3.14 is a floating-point literal, so <code>type(3.14)</code> returns <code>&lt;class 'float'&gt;</code>."
  },
  {
    unit: 1, id: 3,
    q: "Which data structure in Python is immutable (cannot be changed after creation)?",
    opts: ["List", "Dictionary", "Tuple", "Set"],
    ans: 2,
    exp: "Tuples are immutable in Python. Once created, their elements cannot be modified."
  },
  {
    unit: 1, id: 4,
    q: "What does the following list comprehension produce? <code>[x**2 for x in range(4)]</code>",
    opts: ["[1, 4, 9, 16]", "[0, 1, 4, 9]", "[0, 2, 4, 6]", "[1, 2, 3, 4]"],
    ans: 1,
    exp: "<code>range(4)</code> gives 0,1,2,3. Squaring each: 0,1,4,9. Result: <code>[0, 1, 4, 9]</code>."
  },
  {
    unit: 1, id: 5,
    q: "Which operator is used for integer (floor) division in Python 3?",
    opts: ["/", "%", "//", "**"],
    ans: 2,
    exp: "<code>//</code> is the floor division operator. For example, <code>7 // 2</code> returns 3."
  },
  {
    unit: 1, id: 6,
    q: "What is the correct syntax to define a function in Python?",
    opts: ["function myFunc():", "def myFunc():", "define myFunc():", "func myFunc():"],
    ans: 1,
    exp: "Python uses the <code>def</code> keyword to define functions: <code>def myFunc():</code>"
  },
  {
    unit: 1, id: 7,
    q: "Which Python data structure stores key-value pairs?",
    opts: ["List", "Tuple", "Set", "Dictionary"],
    ans: 3,
    exp: "Dictionaries store data as key-value pairs, e.g. <code>{'name': 'Alice', 'age': 25}</code>."
  },
  {
    unit: 1, id: 8,
    q: "What is the output of <code>'ATCG'.lower()</code>?",
    opts: ["ATCG", "atcg", "Atcg", "Error"],
    ans: 1,
    exp: "The <code>lower()</code> string method converts all characters to lowercase: <code>'atcg'</code>."
  },
  {
    unit: 1, id: 9,
    q: "Which method splits a string into a list based on a delimiter?",
    opts: ["join()", "strip()", "split()", "find()"],
    ans: 2,
    exp: "<code>split()</code> splits a string into a list. E.g., <code>'A,T,G'.split(',')</code> → <code>['A','T','G']</code>."
  },
  {
    unit: 1, id: 10,
    q: "To open a file for reading in Python, which mode is used?",
    opts: ["'w'", "'a'", "'r'", "'rb+'"],
    ans: 2,
    exp: "<code>'r'</code> opens a file for reading. This is also the default mode if none is specified."
  },
  {
    unit: 1, id: 11,
    q: "What module is used to work with CSV files in Python?",
    opts: ["json", "csv", "os", "sys"],
    ans: 1,
    exp: "Python's built-in <code>csv</code> module provides tools to read and write CSV files."
  },
  {
    unit: 1, id: 12,
    q: "In Python, sets are defined using which brackets?",
    opts: ["[]", "()", "{}", "set()"],
    ans: 2,
    exp: "Sets use curly braces <code>{}</code>, e.g. <code>{1, 2, 3}</code>. Note: an empty set must use <code>set()</code>."
  },
  {
    unit: 1, id: 13,
    q: "What is 'computational thinking' primarily concerned with?",
    opts: ["Writing machine code", "Problem solving using computational concepts like abstraction and decomposition", "Using only computers to think", "Memorising algorithms"],
    ans: 1,
    exp: "Computational thinking involves problem solving using concepts such as decomposition, pattern recognition, abstraction, and algorithms."
  },
  {
    unit: 1, id: 14,
    q: "Which loop is best when the number of iterations is known in advance?",
    opts: ["while loop", "do-while loop", "for loop", "recursive loop"],
    ans: 2,

  },
  {
    unit: 1, id: 15,
    q: "What does <code>len('Bioinformatics')</code> return?",
    opts: ["13", "14", "15", "12"],
    ans: 1,
    exp: "'Bioinformatics' has 14 characters, so <code>len()</code> returns 14."
  },
  {
    unit: 1, id: 16,
    q: "Which string method checks if all characters are uppercase?",

  },
  {
    unit: 1, id: 17,
    q: "What does the <code>%</code> operator return?",
    opts: ["Quotient of division", "Remainder of division", "Percentage value", "Power"],
    ans: 1,
    exp: "The <code>%</code> (modulo) operator returns the remainder of a division. E.g., <code>10 % 3</code> → 1."
  },
  {
    unit: 1, id: 18,
    q: "Which of the following correctly reads all lines from a file into a list?",
    opts: ["file.read()", "file.readline()", "file.readlines()", "file.readall()"],
    ans: 2,
    exp: "<code>readlines()</code> reads all lines from a file and returns them as a list of strings."
  },

  // ── UNIT II: OOP (Q19–Q29) ──────────────────────────────────────
  {
    unit: 2, id: 19,
    q: "What is the constructor method in a Python class?",
    opts: ["__str__", "__init__", "__new__", "__del__"],
    ans: 1,
    exp: "<code>__init__</code> is Python's constructor method, automatically called when a new object is created."
  },
  {
    unit: 2, id: 20,
    q: "Which principle of OOP allows a class to inherit properties from another class?",

  {
    unit: 2, id: 21,

  {

    q: "Which special method enables the <code>+</code> operator to work with user-defined objects?",

  },
  {
    unit: 2, id: 25,
    q: "Which regex character matches one or more occurrences of the preceding element?",

    ans: 1,
    exp: "The <code>+</code> quantifier matches one or more occurrences. E.g., <code>A+</code> matches 'A', 'AA', 'AAA', etc."
  },
  {
    unit: 2, id: 26,
    q: "Which Python module provides support for regular expressions?",
    opts: ["regex", "re", "regexp", "match"],
    ans: 1,
    exp: "Python's built-in <code>re</code> module provides functions for working with regular expressions."
  },
  {
    unit: 2, id: 27,
    q: "What does the regex pattern <code>\\d</code> match?",
    opts: ["Any whitespace", "Any word character", "Any digit 0–9", "Any non-digit"],
    ans: 2,
    exp: "<code>\\d</code> matches any decimal digit (equivalent to <code>[0-9]</code>)."
  },
  {
    unit: 2, id: 28,
    q: "Which clause in exception handling always executes, regardless of whether an exception was raised?",

  },
  {
    unit: 2, id: 29,
    q: "How do you create a user-defined exception in Python?",
    opts: ["By using the <code>raise</code> keyword alone", "By creating a class that inherits from <code>Exception</code>", "By using the <code>error</code> module", "By catching a SystemError"],
    ans: 1,
    exp: "Custom exceptions are created by defining a class that inherits from Python's built-in <code>Exception</code> class."
  },
  {
    unit: 2, id: 30,
    q: "What does <code>re.findall(pattern, string)</code> return?",
    opts: ["The first match object", "A list of all non-overlapping matches", "True or False", "The match position only"],

    exp: "<code>re.findall()</code> returns a list of all non-overlapping matches of the pattern in the string."

  {
    unit: 2, id: 31,
    q: "In Python OOP, what does <code>self</code> refer to?",

  {
    unit: 2, id: 32,
    q: "Which regex anchor matches the start of a string?",
    opts: ["$", "^", "\\b", "\\A"],
    ans: 1,

  {
    unit: 2, id: 33,
    q: "What is polymorphism in OOP?",

  {
    unit: 2, id: 34,

    q: "Which Biopython module is used to access NCBI databases such as PubMed and GenBank?",

    q: "What does BLAST stand for in bioinformatics?",

  {

    unit: 3, id: 50,
    q: "In multiple sequence alignment using Biopython, which class represents the alignment object?",
    opts: ["SeqRecord", "MultipleSeqAlignment", "PairwiseAligner", "AlignIO"],
    ans: 1,
    exp: "<code>MultipleSeqAlignment</code> from <code>Bio.Align</code> represents a multiple sequence alignment containing SeqRecord objects."
  }
];

const unitNames = {
  1: "Unit I — Python Fundamentals",
  2: "Unit II — OOP, Regex & Exceptions",
  3: "Unit III — Biopython, DB-API & Scientific Libraries"
};

const userAnswers = {};
let submitted = false;

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  let currentUnit = null;

  questions.forEach((q, idx) => {
    if (q.unit !== currentUnit) {
      currentUnit = q.unit;
      const uh = document.createElement('div');
      uh.className = 'unit-header';
      uh.textContent = unitNames[q.unit];
      container.appendChild(uh);
    }

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${q.id}`;

    const opts = q.opts.map((o, i) => `
      <button class="option" id="opt-${q.id}-${i}" onclick="selectAnswer(${q.id}, ${i})" aria-label="Option ${String.fromCharCode(65+i)}: ${o}">
        <span class="opt-key">${String.fromCharCode(65+i)}</span>
        <span>${o}</span>
      </button>
    `).join('');

    card.innerHTML = `
      <div class="q-number">Question ${q.id} of 50</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts-${q.id}">${opts}</div>
      <div class="feedback" id="fb-${q.id}"></div>
    `;
    container.appendChild(card);
  });
}

function selectAnswer(qId, optIdx) {
  if (submitted) return;
  userAnswers[qId] = optIdx;

  const card = document.getElementById(`card-${qId}`);
  card.classList.add('answered');
  card.classList.remove('correct', 'incorrect');

  questions.forEach(q => {
    if (q.id === qId) {
      q.opts.forEach((_, i) => {
        const btn = document.getElementById(`opt-${qId}-${i}`);
        btn.classList.remove('selected', 'correct-ans', 'wrong-ans');
      });
      document.getElementById(`opt-${qId}-${optIdx}`).classList.add('selected');
    }
  });

  updateProgress();
}

function updateProgress() {
  const count = Object.keys(userAnswers).length;
  document.getElementById('progress-bar').style.width = (count / 50 * 100) + '%';
  document.getElementById('progress-text').textContent = `${count} / 50 answered`;
}

function submitQuiz() {
  const count = Object.keys(userAnswers).length;
  if (count < 50) {
    const banner = document.getElementById('warning-banner');
    banner.style.display = 'block';
    banner.textContent = `Please answer all 50 questions before submitting. You have answered ${count}/50.`;
    return;
  }
  document.getElementById('warning-banner').style.display = 'none';
  submitted = true;
  document.getElementById('submit-btn').disabled = true;

  let total = 0;
  const unitCorrect = {1:0, 2:0, 3:0};
  const unitTotal = {1:0, 2:0, 3:0};

  questions.forEach(q => {
    const chosen = userAnswers[q.id];
    const isCorrect = chosen === q.ans;
    unitTotal[q.unit]++;
    if (isCorrect) { total++; unitCorrect[q.unit]++; }

    const card = document.getElementById(`card-${q.id}`);
    card.classList.remove('answered');
    card.classList.add(isCorrect ? 'correct' : 'incorrect');

    q.opts.forEach((_, i) => {
      const btn = document.getElementById(`opt-${q.id}-${i}`);
      btn.disabled = true;
      btn.classList.remove('selected');
      if (i === q.ans) btn.classList.add('correct-ans');
      else if (i === chosen && !isCorrect) btn.classList.add('wrong-ans');
    });

    const fb = document.getElementById(`fb-${q.id}`);
    fb.className = 'feedback ' + (isCorrect ? 'correct' : 'incorrect');
    fb.innerHTML = (isCorrect ? '✓ Correct. ' : '✗ Incorrect. ') + q.exp;
  });

  showResults(total, unitCorrect, unitTotal);
}

function showResults(total, unitCorrect, unitTotal) {
  const pct = Math.round(total / 50 * 100);
  let grade, gradeCls;
  if (pct >= 85) { grade = 'Grade: A — Excellent!'; gradeCls = 'grade-A'; }
  else if (pct >= 70) { grade = 'Grade: B — Good work!'; gradeCls = 'grade-B'; }
  else if (pct >= 55) { grade = 'Grade: C — Needs revision'; gradeCls = 'grade-C'; }
  else { grade = 'Grade: D — Please review all units'; gradeCls = 'grade-D'; }

  document.getElementById('res-score').textContent = `${total} / 50`;
  document.getElementById('res-sub').textContent = `${pct}% — ${50 - total} question${50-total===1?'':'s'} incorrect`;
  const gr = document.getElementById('res-grade');
  gr.textContent = grade; gr.className = 'grade-badge ' + gradeCls;

  const bd = document.getElementById('unit-breakdown');
  bd.innerHTML = [1,2,3].map(u => `
    <div class="unit-box">
      <div class="u-label">${unitNames[u]}</div>
      <div class="u-score">${unitCorrect[u]} / ${unitTotal[u]}</div>
    </div>
  `).join('');

  document.getElementById('results-panel').style.display = 'block';
  document.getElementById('results-panel').scrollIntoView({behavior:'smooth', block:'start'});
}

function retakeQuiz() {
  Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
  submitted = false;
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('results-panel').style.display = 'none';
  document.getElementById('warning-banner').style.display = 'none';
  buildQuiz();
  updateProgress();
  window.scrollTo({top:0, behavior:'smooth'});
}

buildQuiz();
updateProgress();
</script>
</body>
</html>
